name: Update IPL Data
run-name: "Update IPL ${{ inputs.season || 'current' }} season data (${{ inputs.fetch_mode || 'auto' }})"

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'IPL season year'
        required: false
        default: '2026'
      fetch_mode:
        description: 'Fetch mode (auto/full/incremental)'
        required: false
        default: 'auto'
      reprocess:
        description: 'Reprocess already processed matches'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine season
        id: season
        run: |
          if [ -n "${{ github.event.inputs.season }}" ]; then
            echo "year=${{ github.event.inputs.season }}" >> $GITHUB_OUTPUT
          else
            echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          fi

      - name: Determine fetch mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.fetch_mode }}" ]; then
            echo "mode=${{ github.event.inputs.fetch_mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=auto" >> $GITHUB_OUTPUT
          fi

      - name: Fetch and process IPL data
        id: process
        run: |
          cd scripts
          REPROCESS_FLAG=""
          if [ "${{ github.event.inputs.reprocess }}" = "true" ]; then
            REPROCESS_FLAG="--reprocess"
          fi
          if python orchestrator.py \
            --season ${{ steps.season.outputs.year }} \
            --fetch-mode ${{ steps.mode.outputs.mode }} $REPROCESS_FLAG; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check for changes
        if: always()
        id: changes
        run: |
          git add -A
          SEASON=${{ steps.season.outputs.year }}
          NEW_MATCHES=$(git diff --cached --name-only | grep "^data/${SEASON}/matches/match_" | sed 's|.*/match_\([0-9]*\)_.*|\1|' | sort -un | tr '\n' ',' | sed 's/,$//')
          echo "matches=${NEW_MATCHES:-none}" >> $GITHUB_OUTPUT
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Append to run log
        if: always()
        run: |
          SEASON=${{ steps.season.outputs.year }}
          STATUS=${{ steps.process.outputs.status || 'failure' }}
          MATCHES=${{ steps.changes.outputs.matches || 'none' }}
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          if [ "${{ github.event.inputs.reprocess }}" = "true" ]; then
            TYPE="reprocess"
          else
            TYPE="new"
          fi
          mkdir -p logs
          echo "| ${TIMESTAMP} | ${SEASON} | ${MATCHES} | ${TYPE} | ${{ steps.mode.outputs.mode }} | ${STATUS} |" >> logs/run_log.md

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          SEASON=${{ steps.season.outputs.year }}
          MATCHES="${{ steps.changes.outputs.matches || 'none' }}"
          STATUS="${{ steps.process.outputs.status || 'failure' }}"
          if [ "$STATUS" = "failure" ]; then
            git commit -m "Log failed run for IPL ${SEASON}" || true
          elif [ "$MATCHES" = "none" ]; then
            git commit -m "Log run for IPL ${SEASON} (no new data)" || true
          else
            git commit -m "Add IPL ${SEASON} match ${MATCHES} data"
          fi
          git push

      - name: Deploy dashboard to ShinyApps.io
        if: steps.process.outputs.status == 'success' && steps.changes.outputs.has_changes == 'true'
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          pip install rsconnect-python
          rsconnect add --account openipl --name openipl --token "$SHINYAPPS_TOKEN" --secret "$SHINYAPPS_SECRET"
          rsconnect deploy shiny . --name openipl --title openipl
